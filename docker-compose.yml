version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mlb_backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: mlb_frontend
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:1.25-alpine
    container_name: mlb_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/mylifebook.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    networks:
      - internal
    depends_on:
      - backend
      - frontend

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data
  nginx_logs:

networks:
  internal:
    driver: bridge
