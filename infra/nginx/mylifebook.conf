# mylifebook.ru — Nginx configuration

server {
    listen 80;
    server_name mylifebook.ru www.mylifebook.ru;
    return 301 https://mylifebook.ru$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mylifebook.ru;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Robots-Tag           "noindex, nofollow" always;
    add_header X-Frame-Options         DENY always;
    add_header X-Content-Type-Options  nosniff always;
    add_header Referrer-Policy         no-referrer always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/mlb_access.log;
    error_log  /var/log/nginx/mlb_error.log warn;

    location /api/ {
        proxy_pass         http://mlb_backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /api/v1/ai/ {
        proxy_pass         http://mlb_backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 120s;
    }

    location ~ ^/(docs|redoc|openapi.json) {
        allow 127.0.0.1;
        deny  all;
        proxy_pass http://mlb_backend:8000;
    }

    location / {
        proxy_pass       http://mlb_frontend:80;
        proxy_set_header Host $host;
    }

    location ~* \.(js|css|woff2|png|svg|ico|webp)$ {
        proxy_pass  http://mlb_frontend:80;
        expires     1y;
        add_header  Cache-Control "public, immutable";
    }

    location ~* (manifest\.webmanifest|sw\.js)$ {
        proxy_pass  http://mlb_frontend:80;
        expires     -1;
        add_header  Cache-Control "no-store";
    }
}
